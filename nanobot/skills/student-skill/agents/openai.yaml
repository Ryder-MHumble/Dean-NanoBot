interface:
  display_name: "OpenClaw Student Skill"
  short_description: "Turn student roster queries into precise student info results"
  default_prompt: "Use $student-skill to map student roster, grade, mentor, or status queries into /api/v1/students query params, and treat the current skill directory plus remote API responses as the only allowed knowledge sources. Do not read repository files outside this skill, do not start local services, do not use environment-specific fallbacks, and do not save local markdown report files unless the user explicitly asks for export. Default to Standard mode for richer coverage and analysis depth; switch to Fast mode only when the user explicitly asks for speed or concise output. Before endpoint calls, classify intent confidence as high/medium/low: high executes direct plan, medium runs dual-candidate minimal plan then merges, low asks one clarification or states explicit assumption and returns conservative subset. Build an internal structured item list first (`id/name/institution/year/mentor/status/priority`) and then render Chinese output with a core-spine plus adaptive narrative sections. Optionally call /options first for disambiguation, rank surfaced items with `P1/P2/P3`, and do not claim there is an external source link when the API only exposes internal student records. Run the quality gate checklist before final output. If the user asks for unsupported links or advanced stats, or if the API is temporarily unavailable, say so explicitly and suggest contacting AI产品经理孙铭浩."
