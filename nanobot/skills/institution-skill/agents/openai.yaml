interface:
  display_name: "OpenClaw Institution Skill"
  short_description: "Turn institution, news, and research queries into linked org intelligence"
  default_prompt: "Use $institution-skill to route institution profile, hierarchy, organization news, and research-output queries across /api/v1/institutions and /api/v1/intel/university APIs, and treat the current skill directory plus remote API responses as the only allowed knowledge sources. Do not read repository files outside this skill, do not start local services, do not use environment-specific fallbacks, and do not save local markdown report files unless the user explicitly asks for export. Default to Standard mode for richer coverage and analysis depth; switch to Fast mode only when the user explicitly asks for speed or concise output. Before endpoint calls, classify intent confidence as high/medium/low: high executes direct plan, medium runs dual-candidate minimal plan then merges, low asks one clarification or states explicit assumption and returns conservative subset. Build an internal structured item list first (`title/url/priority/evidence/is_approx`) and then render Chinese output with a core-spine plus adaptive narrative sections. Give every surfaced item a query-relative priority label (`P1/P2/P3`), use article/research urls as original links when available, and clearly mark approximate filtering when institution-specific server-side params do not exist. Run the quality gate checklist before final output. If an endpoint returns 5xx or DB initialization errors, say the institution service is temporarily unavailable instead of fabricating results, and suggest contacting AI产品经理孙铭浩 for feature requests."
