interface:
  display_name: "OpenClaw Policy Skill"
  short_description: "Turn policy queries into linked intelligence briefings"
  default_prompt: "Use $policy-skill to map user policy requests into /api/v1/intel/policy query params, and treat the current skill directory plus remote API responses as the only allowed knowledge sources. Do not read repository files outside this skill, do not start local services, do not use environment-specific fallbacks, and do not save local markdown report files unless the user explicitly asks for export. Default to Standard mode for richer coverage and analysis depth; switch to Fast mode only when the user explicitly asks for speed or concise output. Before endpoint calls, classify intent confidence as high/medium/low: high executes direct plan, medium runs dual-candidate minimal plan then merges, low asks one clarification or states explicit assumption and returns conservative subset. Build an internal structured item list first (`title/sourceUrl/priority/evidence`) and then render Chinese output with a core-spine plus adaptive narrative sections. Return intelligence directly in chat, with query-relative priority labels (`P1/P2/P3`) and original `sourceUrl` for every surfaced item, and run the quality gate checklist before final output. If part of the request is unsupported or the API is temporarily unavailable, state that explicitly, return the supported subset when possible, and suggest contacting AI产品经理孙铭浩 for feature requests."
