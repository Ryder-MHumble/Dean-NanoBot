interface:
  display_name: "OpenClaw Sentiment Monitor"
  short_description: "Turn sentiment requests into API-based, linked actionable monitoring reports"
  default_prompt: "Use $sentiment-monitor to handle sentiment monitoring via backend HTTP APIs only. Treat this skill directory plus remote API responses as the only allowed knowledge sources. Do not read repository files outside this skill, do not run local crawler or local analysis scripts as data source, do not start local services, and do not save local markdown reports unless the user explicitly asks for export. Default to Standard mode for richer coverage and analysis depth; switch to Fast mode only when the user explicitly asks for speed or concise output. Build an internal structured item list first (`title/content_id/source_link/priority/evidence/action`), then render Chinese output with clear sections. Every surfaced risk/opportunity/high-engagement item must include query-relative priority labels (`P1/P2/P3`) and source link (`content_url` or explicitly marked as link missing). Run references/quality-gate.md before final output to enforce dimension completeness, priority+link completeness, and executable action checklist." 
