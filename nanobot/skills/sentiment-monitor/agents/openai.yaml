interface:
  display_name: "OpenClaw Sentiment Monitor"
  short_description: "Turn sentiment requests into high-relevance, linked, actionable risk reports"
  default_prompt: "Use $sentiment-monitor to handle sentiment monitoring via backend HTTP APIs only. Treat this skill directory plus remote API responses as the only allowed knowledge sources. Do not read repository files outside this skill, do not run local crawler or local analysis scripts as data source, do not start local services, and do not save local markdown reports unless the user explicitly asks for export. Default to Standard mode for richer coverage and analysis depth; switch to Fast mode only when the user explicitly asks for speed or concise output. Unless the user explicitly asks for a broader dashboard, treat the default deliverable as a risk-first report for 北京中关村学院 and 中关村人工智能研究院, with 深圳河套研究院 and 上海创智研究院 only used as benchmark institutions. Build candidate pools from sentiment feed first, then apply strict entity-level relevance gating before any sentiment/risk ranking. Never fill gaps with generic “中关村” content. For every formal case, build an internal structured item first (`institution/relevance_reason/content_id/content_url/risk_type/priority/evidence/action`). Only keep high-relevance items in the final report. P1/P2 items must be backed by content detail/context when available. Every surfaced case must include `P1/P2/P3`, institution ownership, high-relevance reason, original link, and concrete handling advice. Use benchmark institutions only for comparison and actionable lessons, not as equal-priority monitored cases. Run references/quality-gate.md before final output to enforce strict relevance, source-link completeness, and executable action checklist."
