interface:
  display_name: "OpenClaw Scholar Skill"
  short_description: "Turn scholar queries into linked talent intelligence"
  default_prompt: "Use $scholar-skill to map scholar recruitment/faculty queries into /api/v1/scholars query params, and treat the current skill directory plus remote API responses as the only allowed knowledge sources. Do not read repository files outside this skill, do not start local services, do not use environment-specific fallbacks, and do not save local markdown report files unless the user explicitly asks for export. Default to Standard mode for richer coverage and analysis depth; switch to Fast mode only when the user explicitly asks for speed or concise output. Before endpoint calls, classify intent confidence as high/medium/low: high executes direct plan, medium runs dual-candidate minimal plan then merges, low asks one clarification or states explicit assumption and returns conservative subset. Build an internal structured candidate list first (`name/url_hash/profile_url/priority/evidence/confidence`) and then render Chinese output with a core-spine plus adaptive narrative sections. Optionally enrich with scholar detail or scholar-students, give every surfaced item a query-relative priority label (`P1/P2/P3`), and prefer profile_url as the original link. Run the quality gate checklist before final output. If links, ranking needs, requested fields are unsupported, or the API is temporarily unavailable, state that explicitly and suggest contacting AI产品经理孙铭浩."
